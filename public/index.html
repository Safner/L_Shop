<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Магазин</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,600;0,9..40,700;1,9..40,400&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/style.css" />
  </head>
  <body>
    <header class="site-header">
      <div class="header-inner">
        <div class="brand-block">
          <span class="brand-icon" aria-hidden="true">◇</span>
          <div>
            <div class="brand">Магазин</div>
            <p class="tagline">Выберите товары и оформите корзину — всё на одной странице</p>
          </div>
        </div>
      </div>
    </header>

    <div class="shop-wrap">
      <div class="catalog-col">
        <section class="panel add-panel">
          <h2 class="panel-title">Добавить товар</h2>
          <div id="err-products" class="error" role="alert"></div>
          <div class="add-form">
            <label class="field">
              <span>Название</span>
              <input
                id="name-products"
                type="text"
                placeholder="Например, Сок"
                autocomplete="off"
              />
            </label>
            <label class="field">
              <span>Цена, Br (BYN)</span>
              <input id="price-products" type="number" min="0" step="1" placeholder="120" />
            </label>
            <button type="button" id="add-products" class="btn btn-secondary">В каталог</button>
          </div>
        </section>

        <section class="panel">
          <h2 class="panel-title">Каталог</h2>
          <div id="product-grid" class="product-grid"></div>
          <p id="empty-catalog" class="hint hidden">Пока нет товаров — добавьте первый выше.</p>
        </section>
      </div>

      <aside class="cart-panel panel" aria-label="Корзина">
        <div class="cart-head">
          <h2 class="panel-title">Корзина</h2>
          <span class="cart-badge" id="cart-count">0</span>
        </div>
        <div id="err-cart" class="error" role="alert"></div>
        <ul id="cart-lines" class="cart-lines"></ul>
        <div id="cart-empty" class="cart-empty">Корзина пуста — добавьте товары из каталога</div>
        <div class="cart-footer hidden" id="cart-footer">
          <div class="cart-total-row">
            <span>Итого</span>
            <strong><span id="total-cart">0</span> Br</strong>
          </div>
          <button type="button" id="clear-cart" class="btn btn-ghost">Очистить корзину</button>
        </div>
      </aside>
    </div>

    <script src="/app.js"></script>
  </body>
</html>
